name: Daily SEO Blog Automation

on:
  schedule:
    - cron: '0 8 * * *' # Every day at 8:00 AM UTC
  workflow_dispatch: # Allows manual testing

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate SEO Article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} # Securely uses your secret
        run: node scripts/generate-article.js
      - name: Commit and Push new article
        run: |
          git config --global user.name "AI Blog Bot"
          git config --global user.email "bot@automatedblog.com"
          git add content/blog/*.md
          git diff --staged --quiet || git commit -m "docs(blog): automated daily SEO article publish"
          git push origin main
