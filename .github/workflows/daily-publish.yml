name: Daily SEO Blog Automation

on:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate SEO Article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-article.js

      - name: Commit and Push new article
        run: |
          git config --global user.name "AI Blog Bot"
          git config --global user.email "bot@automatedblog.com"
          git add content/blog/*.md
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "docs(blog): automated daily SEO article publish"
          git push origin main
