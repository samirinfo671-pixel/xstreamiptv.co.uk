name: Daily SEO Blog Automation

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm install openai dotenv
      - name: Generate SEO Article
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: node scripts/generate-article.js
      - name: Commit and Push new article
        run: |
          git config --global user.name "AI Blog Bot"
          git config --global user.email "bot@automatedblog.com"
          git add content/blog/*.md
          git diff --staged --quiet || git commit -m "docs(blog): automated daily SEO article publish via OpenRouter"
          git push origin main
